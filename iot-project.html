<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Fridgy - Lucas Promayon</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .video-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            margin: 2rem auto;
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            margin-top: 2rem;
        }

        .project-details {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Background Animation Elements -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">LP<span>.</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Retour au Portfolio</a></li>
            </ul>
        </div>
    </nav>

    <main class="video-page">
        <div class="project-details">
            <div class="project-badge"
                style="background: rgba(245, 158, 11, 0.2); color: var(--iot-color); display: inline-block; margin-bottom: 1rem; padding: 0.4rem 1rem; border-radius: 20px; font-weight: 600;">
                Projet Majeur • IoT</div>
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Fridgy : Serveur Web & Objet Connecté</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem;">Présentation vidéo du
                développement et du fonctionnement de l'objet connecté Fridgy.</p>
        </div>

        <div class="video-container glass-panel fade-in">
            <!-- Remplacer 'VIDEO_ID' par l'ID réel de la vidéo YouTube -->
            <iframe src="https://youtu.be/A3cbRGAd9Jg" title="Présentation Projet Fridgy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
        </div>

        <a href="index.html" class="btn secondary back-btn fade-in"><i class='bx bx-arrow-back'></i> Retourner aux
            projets</a>
    </main>

    <script src="script.js"></script>
</body>

</html>
